<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>预设对比助手 · 离线版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0f;color:#e0dfe3;font-family:'Segoe UI',sans-serif;min-height:100vh}
#extensionsMenu,#settings_preset_openai{display:none}
#pca-standalone-loader{position:fixed;inset:0;z-index:999999;background:#0d0d0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
#pca-standalone-loader.hidden{opacity:0;pointer-events:none}
.pca-sl-title{font-size:22px;font-weight:800;color:#e0dfe3;letter-spacing:1px}
.pca-sl-sub{font-size:12px;color:#888;margin-bottom:8px}
.pca-sl-drop{width:min(500px,90vw);min-height:180px;border:2px dashed #555;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;cursor:pointer;transition:border-color .2s,background .2s}
.pca-sl-drop:hover,.pca-sl-drop.dragover{border-color:#c79;background:rgba(199,119,153,0.06)}
.pca-sl-drop-icon{font-size:40px;opacity:0.5}
.pca-sl-drop-text{font-size:14px;color:#aaa}
.pca-sl-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;font-size:13px;font-weight:600;background:transparent;color:#c9a0b0;border:1px solid #6a3344;border-radius:4px;cursor:pointer;transition:all .2s;font-family:inherit}
.pca-sl-btn:hover{border-color:#c79;color:#e0c0d0;background:rgba(199,119,153,0.08)}
.pca-sl-btn-primary{background:linear-gradient(90deg,#3a1520,#4a2535);color:#f0d0e0;border-color:#8a4455}
.pca-sl-btn-primary:hover{background:linear-gradient(90deg,#4a2535,#5a3545)}
.pca-sl-status{font-size:12px;color:#888;min-height:20px}
.pca-sl-files{width:min(500px,90vw);max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin-top:4px}
.pca-sl-file{font-size:11px;color:#aaa;padding:3px 8px;background:rgba(255,255,255,0.03);border-radius:4px;display:flex;justify-content:space-between}
.pca-sl-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pca-sl-or{font-size:12px;color:#666;margin:4px 0}
.pca-sl-remember{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.pca-sl-remember input{accent-color:#c79}
</style>
</head>
<body>

<!-- 酒馆 UI 占位 -->
<div id="extensionsMenu"></div>
<select id="settings_preset_openai"></select>

<!-- 加载界面 -->
<div id="pca-standalone-loader">
    <div class="pca-sl-title">✧ 预设对比助手 · 离线版</div>
    <div class="pca-sl-sub">加载预设 JSON 文件后即可使用全部功能（编辑后自动保存到浏览器缓存）</div>

    <div class="pca-sl-drop" id="pca-sl-drop">
        <div class="pca-sl-drop-icon">📂</div>
        <div class="pca-sl-drop-text">拖放 .json 预设文件到此处</div>
        <div class="pca-sl-drop-text" style="font-size:11px;color:#666">支持多选 · 支持拖入文件夹</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center">
        <button class="pca-sl-btn" id="pca-sl-pick-files" onclick="event.stopPropagation()">📄 选择文件</button>
        <span class="pca-sl-or">或</span>
        <button class="pca-sl-btn" id="pca-sl-pick-folder">📁 选择文件夹</button>
    </div>

    <div id="pca-sl-folder-section" style="display:none">
        <label class="pca-sl-remember">
            <input type="checkbox" id="pca-sl-remember" checked>
            记住此文件夹（下次自动加载）
        </label>
    </div>

    <div class="pca-sl-status" id="pca-sl-status"></div>
    <div class="pca-sl-files" id="pca-sl-files"></div>

    <div style="display:flex;gap:10px;margin-top:8px">
        <button class="pca-sl-btn pca-sl-btn-primary" id="pca-sl-open" style="display:none">✦ 打开预设对比助手</button>
    </div>

    <div id="pca-sl-cache-info" style="margin-top:12px;display:none;text-align:center">
        <div style="font-size:11px;color:#666;margin-bottom:6px">上次记住的文件夹：</div>
        <div style="display:flex;gap:8px;align-items:center;justify-content:center">
            <span id="pca-sl-cache-path" style="font-size:12px;color:#aaa"></span>
            <button class="pca-sl-btn" id="pca-sl-cache-reload" style="padding:4px 12px;font-size:11px">重新加载</button>
            <button class="pca-sl-btn" id="pca-sl-cache-clear" style="padding:4px 12px;font-size:11px;color:#c66;border-color:#633">清除记忆</button>
        </div>
    </div>
</div>

<script>
// ===============================================================
// SillyTavern API Shim — 让 index.js 在无酒馆环境下正常运行
// ===============================================================
var PCA_STANDALONE = true;
var PCA_REMOTE_VERSION = '2.8.3';
var PCA_REMOTE_SCRIPT = 'https://cdn.jsdelivr.net/gh/hejianzi/83rd_Fire_UAF@' + PCA_REMOTE_VERSION + '/indexxx.js';
var _pcaPresetStore = {};
var _pcaFolderHandle = null;
var _pcaDB = null;

// ---- IndexedDB ----
function _pcaOpenDB() {
    return new Promise(function(ok, fail) {
        var r = indexedDB.open('pca_standalone', 1);
        r.onupgradeneeded = function(e) {
            var db = e.target.result;
            if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
            if (!db.objectStoreNames.contains('presets')) db.createObjectStore('presets');
        };
        r.onsuccess = function(e) { _pcaDB = e.target.result; ok(_pcaDB); };
        r.onerror = function() { fail(r.error); };
    });
}
function _pcaDBGet(s, k) {
    return new Promise(function(ok) {
        try { var t = _pcaDB.transaction(s,'readonly'); var r = t.objectStore(s).get(k); r.onsuccess=function(){ok(r.result);}; r.onerror=function(){ok();}; } catch(e){ok();}
    });
}
function _pcaDBPut(s, k, v) {
    return new Promise(function(ok) {
        try { var t = _pcaDB.transaction(s,'readwrite'); t.objectStore(s).put(v,k); t.oncomplete=function(){ok();}; t.onerror=function(){ok();}; } catch(e){ok();}
    });
}
function _pcaDBDel(s, k) {
    return new Promise(function(ok) {
        try { var t = _pcaDB.transaction(s,'readwrite'); t.objectStore(s).delete(k); t.oncomplete=function(){ok();}; } catch(e){ok();}
    });
}

// ---- 缓存 ----
async function _pcaCachePresets() { if (_pcaDB) await _pcaDBPut('presets','all',_pcaPresetStore); }
async function _pcaRestoreCache() {
    if (!_pcaDB) return false;
    var c = await _pcaDBGet('presets','all');
    if (c && typeof c==='object' && Object.keys(c).length) { Object.assign(_pcaPresetStore,c); _pcaUpdateSelect(); return true; }
    return false;
}

// ---- SillyTavern Mock ----
var SillyTavern = {
    getContext: function() {
        return {
            getRequestHeaders: function() { return {}; },
            getPresetManager: function() {
                        var presetSelect = document.querySelector('#settings_preset_openai');
                        return {
                            apiId: 'openai',
                            select: presetSelect ? [presetSelect] : [],
                    getAllPresets: function() {
                        var n = Object.keys(_pcaPresetStore);
                        return { preset_names:n, presets:n.map(function(k){return _pcaPresetStore[k];}) };
                    },
                    getPresetList: function() { return this.getAllPresets(); },
                    getPresetByName: function(name) { var d=_pcaPresetStore[name]; return d?JSON.parse(JSON.stringify(d)):null; },
                    getCompletionPresetByName: function(name) { return this.getPresetByName(name); },
                    findPreset: function(name) { var n=Object.keys(_pcaPresetStore); var i=n.indexOf(name); return i>=0?i:null; },
                    savePreset: async function(name, data) {
                        _pcaPresetStore[name] = JSON.parse(JSON.stringify(data));
                        _pcaUpdateSelect();
                        await _pcaCachePresets();
                    },
                    deletePreset: async function(name) {
                        delete _pcaPresetStore[name];
                        _pcaUpdateSelect();
                        await _pcaCachePresets();
                    }
                };
            },
            extensionSettings: {},
            extension_settings: {}
        };
    },
    Popup: function(html) { this._html = html; },
    POPUP_TYPE: { TEXT:1, CONFIRM:2, INPUT:3 }
};
SillyTavern.Popup.prototype.show = function() {
    var doc = document;
    var old = doc.querySelector('#pca-overlay'); if (old) old.remove();
    var ov = doc.createElement('div');
    ov.id = 'pca-overlay';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;display:flex;align-items:center;justify-content:center;';
    ov.innerHTML = this._html;
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    doc.body.appendChild(ov);
    setTimeout(function(){ if(typeof pcaBindPanel==='function') pcaBindPanel(); },200);
    return Promise.resolve();
};

// ---- 拦截 fetch ----
var _origFetch = window.fetch;
window.fetch = function(url, opts) {
    var u = (typeof url==='string') ? url : '';
    if (u.indexOf('/api/presets/save')!==-1) {
        try { var b=JSON.parse(opts.body); if(b.name&&b.preset){_pcaPresetStore[b.name]=b.preset;_pcaUpdateSelect();_pcaCachePresets();} } catch(e){}
        return Promise.resolve(new Response('{"ok":true}',{status:200,headers:{'Content-Type':'application/json'}}));
    }
    if (u.indexOf('/api/presets/delete')!==-1) {
        try { var b=JSON.parse(opts.body); if(b.name){delete _pcaPresetStore[b.name];_pcaUpdateSelect();_pcaCachePresets();} } catch(e){}
        return Promise.resolve(new Response('{"ok":true}',{status:200,headers:{'Content-Type':'application/json'}}));
    }
    if (u.indexOf('/api/settings/get')!==-1) {
        var n=Object.keys(_pcaPresetStore);
        return Promise.resolve(new Response(JSON.stringify({openai_setting_names:n,openai_settings:n.map(function(k){return _pcaPresetStore[k];})}),{status:200,headers:{'Content-Type':'application/json'}}));
    }
    return _origFetch.apply(window,arguments);
};

// ---- UI 工具 ----
function _pcaUpdateSelect() {
    var sel = document.querySelector('#settings_preset_openai');
    if (!sel) return;
    var cur = sel.value;
    sel.innerHTML = '';
    Object.keys(_pcaPresetStore).forEach(function(n) {
        var o = document.createElement('option'); o.value=n; o.text=n; sel.appendChild(o);
    });
    if (cur && _pcaPresetStore[cur]) sel.value = cur;
}

// ---- 文件加载 ----
async function _pcaLoadFiles(files) {
    var loaded=0, errors=0;
    var statusEl=document.querySelector('#pca-sl-status');
    var filesEl=document.querySelector('#pca-sl-files');
    filesEl.innerHTML='';
    for (var i=0;i<files.length;i++) {
        var f=files[i];
        if (!f.name.endsWith('.json')) continue;
        try {
            var txt = await f.text();
            var data = JSON.parse(txt);
            if (!data.prompts||!Array.isArray(data.prompts)) {
                errors++;
                filesEl.innerHTML+='<div class="pca-sl-file" style="color:#c66"><span class="pca-sl-file-name">'+f.name+'</span><span>非预设文件</span></div>';
                continue;
            }
            var name=f.name.replace(/\.json$/i,'');
            _pcaPresetStore[name]=data;
            loaded++;
            filesEl.innerHTML+='<div class="pca-sl-file"><span class="pca-sl-file-name">'+name+'</span><span style="color:#8c8">✓</span></div>';
        } catch(e) {
            errors++;
            filesEl.innerHTML+='<div class="pca-sl-file" style="color:#c66"><span class="pca-sl-file-name">'+f.name+'</span><span>解析失败</span></div>';
        }
    }
    _pcaUpdateSelect();
    await _pcaCachePresets();
    if(statusEl) statusEl.textContent='已加载 '+loaded+' 个预设'+(errors?'，'+errors+' 个失败':'');
    if(loaded>0) document.querySelector('#pca-sl-open').style.display='';
    return loaded;
}

async function _pcaLoadFolder(handle, remember) {
    var files=[];
    for await (var entry of handle.values()) {
        if (entry.kind==='file'&&entry.name.endsWith('.json')) files.push(await entry.getFile());
    }
    if (!files.length) { document.querySelector('#pca-sl-status').textContent='该文件夹没有 .json 文件'; return; }
    var n = await _pcaLoadFiles(files);
    if (n>0 && remember) {
        _pcaFolderHandle=handle;
        await _pcaDBPut('meta','folderHandle',handle);
        await _pcaDBPut('meta','folderName',handle.name);
    }
}

function _pcaReadDirEntry(dirEntry) {
    return new Promise(function(ok) {
        var reader=dirEntry.createReader(), all=[];
        (function read(){ reader.readEntries(function(entries){
            if(!entries.length){ok(all);return;}
            var p=[];
            entries.forEach(function(e){ if(e.isFile&&e.name.endsWith('.json')) p.push(new Promise(function(r){e.file(function(f){all.push(f);r();},r);})); });
            Promise.all(p).then(read);
        }); })();
    });
}

function _pcaLoadRemoteScript() {
    return new Promise(function(ok) {
        var old = document.querySelector('#pca-remote-script');
        if (old) old.remove();
        var s = document.createElement('script');
        s.id = 'pca-remote-script';
        s.src = PCA_REMOTE_SCRIPT;
        s.onload = function(){ ok(true); };
        s.onerror = function(){
            var st = document.querySelector('#pca-sl-status');
            if (st) st.textContent = '插件 JS 加载失败：' + PCA_REMOTE_SCRIPT;
            ok(false);
        };
        document.body.appendChild(s);
    });
}

function _pcaOpenPanel() {
    var loader=document.querySelector('#pca-standalone-loader');
    if(loader){loader.classList.add('hidden');setTimeout(function(){loader.style.display='none';},300);}
    if(typeof pcaOpenPanel==='function') pcaOpenPanel();
    else {
        var st = document.querySelector('#pca-sl-status');
        if (st) st.textContent = '插件 JS 尚未加载完成，请稍后再试';
    }
}

// ---- 初始化 ----
async function _pcaInit() {
    await _pcaLoadRemoteScript();
    await _pcaOpenDB();

    var cachedHandle=await _pcaDBGet('meta','folderHandle');
    var cachedName=await _pcaDBGet('meta','folderName');
    if (cachedHandle&&cachedName) {
        var ci=document.querySelector('#pca-sl-cache-info');
        var cp=document.querySelector('#pca-sl-cache-path');
        if(ci&&cp){ci.style.display='';cp.textContent=cachedName;}
    }

    var restored=await _pcaRestoreCache();
    if (restored) {
        var n=Object.keys(_pcaPresetStore).length;
        document.querySelector('#pca-sl-status').textContent='已从缓存恢复 '+n+' 个预设';
        document.querySelector('#pca-sl-open').style.display='';
    }

    // 拖放
    var drop=document.querySelector('#pca-sl-drop');
    drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('dragover');});
    drop.addEventListener('dragleave',function(){drop.classList.remove('dragover');});
    drop.addEventListener('drop',async function(e){
        e.preventDefault();drop.classList.remove('dragover');
        var items=e.dataTransfer.items,files=[];
        if(items&&items.length){
            for(var i=0;i<items.length;i++){
                if(items[i].webkitGetAsEntry){var en=items[i].webkitGetAsEntry();if(en&&en.isDirectory){files=files.concat(await _pcaReadDirEntry(en));continue;}}
                var f=items[i].getAsFile();if(f)files.push(f);
            }
        } else files=Array.from(e.dataTransfer.files);
        if(files.length) await _pcaLoadFiles(files);
    });
    drop.addEventListener('click',function(){document.querySelector('#pca-sl-pick-files').click();});

    // 选择文件
    document.querySelector('#pca-sl-pick-files').addEventListener('click',function(e){
        e.stopPropagation();
        var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.multiple=true;
        inp.addEventListener('change',function(){if(inp.files.length)_pcaLoadFiles(Array.from(inp.files));});
        inp.click();
    });

    // 选择文件夹
    document.querySelector('#pca-sl-pick-folder').addEventListener('click',async function(){
        if(!window.showDirectoryPicker){alert('当前浏览器不支持文件夹选择（需要 Chrome/Edge 86+）。\n请改用拖放或文件选择。');return;}
        try{
            var h=await window.showDirectoryPicker({mode:'read'});
            document.querySelector('#pca-sl-folder-section').style.display='';
            await _pcaLoadFolder(h, document.querySelector('#pca-sl-remember').checked);
        }catch(e){if(e.name!=='AbortError')console.error(e);}
    });

    // 打开面板
    document.querySelector('#pca-sl-open').addEventListener('click',_pcaOpenPanel);

    // 重新加载缓存文件夹
    document.querySelector('#pca-sl-cache-reload').addEventListener('click',async function(){
        if(!cachedHandle)return;
        try{
            var perm=await cachedHandle.requestPermission({mode:'read'});
            if(perm==='granted'){_pcaPresetStore={};await _pcaLoadFolder(cachedHandle,true);}
            else alert('需要授予文件夹读取权限');
        }catch(e){
            alert('无法访问之前的文件夹，请重新选择。');
            await _pcaDBDel('meta','folderHandle');await _pcaDBDel('meta','folderName');
            document.querySelector('#pca-sl-cache-info').style.display='none';
        }
    });

    // 清除缓存
    document.querySelector('#pca-sl-cache-clear').addEventListener('click',async function(){
        await _pcaDBDel('meta','folderHandle');await _pcaDBDel('meta','folderName');await _pcaDBDel('presets','all');
        _pcaPresetStore={};_pcaFolderHandle=null;_pcaUpdateSelect();
        document.querySelector('#pca-sl-cache-info').style.display='none';
        document.querySelector('#pca-sl-status').textContent='缓存已清除';
        document.querySelector('#pca-sl-open').style.display='none';
        document.querySelector('#pca-sl-files').innerHTML='';
    });
}
_pcaInit();
</script>
</body>
</html>
